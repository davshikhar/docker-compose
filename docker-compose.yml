version: '3.8'
services:
  postgres:
    image: postgres
    ports: 
        5432:5432
  
  redis:
    image: redis
    ports:
      6379:6379
  
  user_app:
    build:
    context: ./
    dockerfile: Dockerfile
    environment: DATABASE_URL=<url>
    ports:
      3000:3000
    depends_on:
      -postgres 